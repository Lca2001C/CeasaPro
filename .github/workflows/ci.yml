name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ceasapro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ceasapro_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ceasapro_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ceasapro_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-change-in-production-32-bytes
      JWT_REFRESH_SECRET: ci-refresh-secret-change-in-production-32-bytes
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 30
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
      MP_WEBHOOK_SECRET: ci-webhook-secret
      SEED_SUPERADMIN_PASSWORD: ci-superadmin-password-123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Production build
        run: npm run build

# PostgreSQL local para desenvolvimento do CeasaPro.
# Suba com:  docker compose up -d
# A DATABASE_URL do .env já aponta para este banco.
services:
  db:
    image: postgres:16
    container_name: ceasapro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ceasapro
    ports:
      - "5432:5432"
    volumes:
      - ceasapro_pgdata:/var/lib/postgresql/data

volumes:
  ceasapro_pgdata:
